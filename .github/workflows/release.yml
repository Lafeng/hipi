name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make CXXFLAGS="-std=c++17 -O3 -Wall -Wextra"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hipi-linux-x64
          path: hipi

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu

      - name: Build
        run: make CXXFLAGS="-std=c++17 -O3 -Wall -Wextra" CXX=aarch64-linux-gnu-g++

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hipi-linux-arm64
          path: hipi

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make CXXFLAGS="-std=c++17 -O3 -Wall -Wextra"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hipi-macos-arm64
          path: hipi

  release:
    needs: [build-linux-x64, build-linux-arm64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          cd artifacts
          chmod +x hipi-linux-x64/hipi hipi-linux-arm64/hipi hipi-macos-arm64/hipi
          mv hipi-linux-x64/hipi hipi-linux-x64/hipi-linux-x64
          mv hipi-linux-arm64/hipi hipi-linux-arm64/hipi-linux-arm64
          mv hipi-macos-arm64/hipi hipi-macos-arm64/hipi-macos-arm64
          tar -czvf hipi-linux-x64.tar.gz -C hipi-linux-x64 hipi-linux-x64
          tar -czvf hipi-linux-arm64.tar.gz -C hipi-linux-arm64 hipi-linux-arm64
          tar -czvf hipi-macos-arm64.tar.gz -C hipi-macos-arm64 hipi-macos-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/hipi-linux-x64.tar.gz
            artifacts/hipi-linux-arm64.tar.gz
            artifacts/hipi-macos-arm64.tar.gz